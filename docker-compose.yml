services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conexadb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conexadb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=conexadb;Username=postgres;Password=postgres"
      Jwt__Key: "docker-compose-development-jwt-signing-key-not-for-production"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
